<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tészta Mester</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #000; --glass: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1); --accent: #ff9f0a;
            --text: #fff; --success: #30d158; --gray: #8e8e93; --danger: #ff453a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border-radius: 30px; border: 1px solid var(--border); min-height: 92vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1, h2 { margin: 0; color: var(--accent); }
        .sub-label { font-size: 12px; color: var(--gray); display: block; margin-top: 2px; }
        .item-card { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin: 8px 0; box-sizing: border-box; font-size: 16px; outline: none; }
        .main-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 18px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .add-btn { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: #1c1c1e; padding: 25px; border-radius: 25px; width: 100%; max-width: 350px; border: 1px solid var(--border); text-align: center; }
        .hidden { display: none; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--accent); font-weight: bold; }
        
        /* Recept rács */
        .recipe-grid { display: grid; grid-template-columns: 2fr 1fr 45px; gap: 10px; align-items: center; margin-bottom: 10px; }
        .recipe-grid input { margin: 0; text-align: center; }
        .recipe-grid input:first-child { text-align: left; }
    </style>
</head>
<body>

<div id="loading-overlay">SZINKRONIZÁLÁS...</div>

<div id="login-screen" class="container" style="justify-content: center;">
    <h1 style="margin-bottom:30px">TÉSZTA MESTER</h1>
    <input type="text" id="login-user" placeholder="Felhasználónév" value="Jani">
    <input type="password" id="login-pass" placeholder="Jelszó">
    <button class="main-btn" onclick="handleLogin()">BELÉPÉS</button>
</div>

<div id="view-main" class="container hidden">
    <div class="header">
        <h2>TÉSZTÁK</h2>
        <button class="add-btn" onclick="openModal('modal-new-dough')">+</button>
    </div>
    <div id="dough-list"></div>
    <div style="flex-grow: 1;"></div>
    <button onclick="logout()" style="background:none; border:none; color:var(--gray); font-size:12px; margin-top: 20px;">Kijelentkezés</button>
</div>

<div id="view-recipe" class="container hidden">
    <div class="header">
        <div>
            <h2 id="recipe-dough-name">Tészta</h2>
            <span class="sub-label">(anyagnorma)</span>
        </div>
        <button class="add-btn" onclick="openModal('modal-add-ingredient')">+</button>
    </div>
    <div id="ingredient-list"></div>
    <button class="main-btn" style="background: var(--gray)" onclick="showMain()">VISSZA</button>
</div>

<div id="modal-new-dough" class="modal">
    <div class="modal-content">
        <h3>Új tészta</h3>
        <input type="text" id="new-dough-name" placeholder="Tészta neve">
        <button class="main-btn" onclick="saveNewDough()">MENTÉS</button>
        <button class="main-btn" style="background:none" onclick="closeModal()">Mégse</button>
    </div>
</div>

<div id="modal-dough-menu" class="modal">
    <div class="modal-content">
        <h3 id="menu-title" style="color:var(--accent)">Opciók</h3>
        <button class="main-btn" onclick="openRenameDough()">Átnevezés</button>
        <button class="main-btn" onclick="openRecipeEditor()">Szerkesztés (anyagnorma)</button>
        <button class="main-btn" style="background:var(--danger)" onclick="deleteDough()">Törlés</button>
        <button class="main-btn" style="background:none" onclick="closeModal()">Bezár</button>
    </div>
</div>

<div id="modal-add-ingredient" class="modal">
    <div class="modal-content">
        <h3>Új alapanyag</h3>
        <input type="text" id="new-ing-name" placeholder="Megnevezés (pl. Víz)">
        <input type="number" id="new-ing-percent" placeholder="Százalék (%)" inputmode="decimal">
        <button class="main-btn" onclick="saveIngredient()">HOZZÁADÁS</button>
        <button class="main-btn" style="background:none" onclick="closeModal()">Mégse</button>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('teszta_session'));
    let activeId = "";
    let activeName = "";

    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // LOGIN & NAVIGÁCIÓ
    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}shopping_users/${u}.json`);
            let stored = await res.json();
            if (stored && String(stored).replace(/"/g, '') === p) {
                currentUser = { name: u };
                localStorage.setItem('teszta_session', JSON.stringify(currentUser));
                initApp();
            } else { alert("Hibás adatok!"); }
        } catch (e) { alert("Szerver hiba!"); }
        showLoading(false);
    }

    function initApp() {
        document.getElementById('login-screen').classList.add('hidden');
        showMain();
    }

    function showMain() {
        document.getElementById('view-main').classList.remove('hidden');
        document.getElementById('view-recipe').classList.add('hidden');
        loadDoughs();
    }

    // TÉSZTA KEZELÉS
    async function loadDoughs() {
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}teszta_master/${currentUser.name}.json`);
            const data = await res.json();
            const list = document.getElementById('dough-list');
            list.innerHTML = data ? "" : "<p style='text-align:center; color:var(--gray)'>Nincs még tészta.</p>";
            if(data) {
                Object.keys(data).forEach(id => {
                    list.innerHTML += `<div class="item-card"><span style="font-weight:bold; font-size:18px;" onclick="alert('Itt lesznek a termékek')">${data[id].name}</span><button style="background:none; border:none; font-size:22px;" onclick="openDoughMenu('${id}', '${data[id].name}')">⚙️</button></div>`;
                });
            }
        } catch (e) {}
        showLoading(false);
    }

    async function saveNewDough() {
        const name = document.getElementById('new-dough-name').value.trim();
        if(!name) return;
        showLoading(true);
        try {
            const initialData = { name: name, recept: { "liszt": { nev: "Liszt", szazalek: 100 } } };
            await fetch(`${DB_URL}teszta_master/${currentUser.name}.json`, { method: 'POST', body: JSON.stringify(initialData) });
            closeModal();
            loadDoughs();
        } catch (e) {}
        showLoading(false);
    }

    function openDoughMenu(id, name) { activeId = id; activeName = name; document.getElementById('menu-title').innerText = name; openModal('modal-dough-menu'); }

    // RECEPT SZERKESZTŐ LOGIKA
    async function openRecipeEditor() {
        closeModal();
        document.getElementById('view-main').classList.add('hidden');
        document.getElementById('view-recipe').classList.remove('hidden');
        document.getElementById('recipe-dough-name').innerText = activeName;
        loadIngredients();
    }

    async function loadIngredients() {
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/recept.json`);
            const data = await res.json();
            const list = document.getElementById('ingredient-list');
            list.innerHTML = "";
            if(data) {
                Object.keys(data).forEach(key => {
                    const ing = data[key];
                    const isLiszt = ing.nev.toLowerCase() === 'liszt';
                    list.innerHTML += `
                        <div class="recipe-grid">
                            <input type="text" value="${ing.nev}" readonly>
                            <input type="text" value="${ing.szazalek} %" readonly>
                            ${isLiszt ? '<span></span>' : `<button style="background:none; border:none; font-size:18px;" onclick="deleteIngredient('${key}')">🗑️</button>`}
                        </div>`;
                });
            }
        } catch (e) {}
        showLoading(false);
    }

    async function saveIngredient() {
        const nev = document.getElementById('new-ing-name').value.trim();
        const szazalek = document.getElementById('new-ing-percent').value;
        if(!nev || !szazalek) return;
        showLoading(true);
        try {
            await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/recept.json`, {
                method: 'POST',
                body: JSON.stringify({ nev: nev, szazalek: parseFloat(szazalek) })
            });
            document.getElementById('new-ing-name').value = "";
            document.getElementById('new-ing-percent').value = "";
            closeModal();
            loadIngredients();
        } catch (e) {}
        showLoading(false);
    }

    async function deleteIngredient(key) {
        if(!confirm("Törlöd ezt az alapanyagot?")) return;
        showLoading(true);
        try {
            await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/recept/${key}.json`, { method: 'DELETE' });
            loadIngredients();
        } catch (e) {}
        showLoading(false);
    }

    async function deleteDough() {
        if(!confirm("Biztosan törlöd a teljes tésztát?")) return;
        showLoading(true);
        try {
            await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}.json`, { method: 'DELETE' });
            closeModal();
            showMain();
        } catch (e) {}
        showLoading(false);
    }

    function logout() { localStorage.removeItem('teszta_session'); location.reload(); }
    if(currentUser) initApp();
</script>
</body>
</html>
