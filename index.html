<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TÉSZTA PRO</title>
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff;
            --accent: #007aff; --border: #2c2c2e; --danger: #ff453a; --success: #30d158;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Navigáció */
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; }
        .add-btn { position: absolute; right: 20px; font-size: 28px; color: var(--accent); cursor: pointer; }
        .back-btn { position: absolute; left: 20px; color: var(--accent); cursor: pointer; display: none; }

        /* Listák és Táblázatok */
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .pasta-item { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 10px; text-align: center; font-size: 18px; border: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-size: 12px; color: #8e8e93; text-align: left; padding: 8px; }
        td { padding: 5px; }
        
        .cell-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 12px 8px; border-radius: 8px; width: 100%; text-align: left; font-size: 14px; }
        .num-input { text-align: right; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid var(--border); }
        
        input[type="text"], input[type="number"] { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin: 10px 0; box-sizing: border-box; }
        
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .save { background: var(--accent); color: white; }
        .cancel { background: none; color: white; }
        .delete { color: var(--danger); background: none; }

        .row-ctrl { display: flex; gap: 5px; justify-content: center; }
        .circle-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .summary-bar { background: var(--card); border-top: 2px solid var(--accent); padding: 20px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="back-button" class="back-btn" onclick="goHome()">❮ Vissza</div>
    <h1 id="main-title">TÉSZTA</h1>
    <div id="top-add-btn" class="add-btn" onclick="openAddModal()">+</div>
</div>

<div id="view-home" class="container">
    <div id="pasta-list"></div>
</div>

<div id="view-recipe" class="container hidden">
    <table id="recipe-table">
        <thead>
            <tr><th>MEGNEVEZÉS</th><th style="width:80px">SZÁZALÉK</th><th style="width:80px">MŰVELET</th></tr>
        </thead>
        <tbody id="recipe-body"></tbody>
    </table>
    <button class="action-btn save" onclick="saveFullRecipe()">MENTÉS</button>
</div>

<div id="view-calc" class="container hidden">
    <table id="calc-table">
        <thead>
            <tr><th>TÍPUS</th><th style="width:60px">SÚLY</th><th style="width:60px">DB</th><th style="width:40px"></th></tr>
        </thead>
        <tbody id="calc-body"></tbody>
    </table>
    <div style="height: 150px;"></div>
    <div class="summary-bar" id="result-summary">
        </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3 id="edit-label">Módosítás</h3>
        <input type="text" id="edit-input-text" class="hidden">
        <input type="number" id="edit-input-num" class="hidden">
        <button class="action-btn save" onclick="confirmEdit()">OKÉ</button>
        <button class="action-btn cancel" onclick="closeModal('edit-modal')">Mégse</button>
    </div>
</div>

<div id="options-modal" class="modal">
    <div class="modal-content">
        <h3 id="opt-title">Opciók</h3>
        <button class="action-btn save" onclick="openRename()">Átnevezés</button>
        <button class="action-btn save" style="background:#5856d6" onclick="openRecipeEditor()">Szerkesztés (Recept)</button>
        <button class="action-btn delete" onclick="deletePasta()">Törlés</button>
        <button class="action-btn cancel" onclick="closeModal('options-modal')">Vissza</button>
    </div>
</div>

<script>
    // Itt folytatjuk a logikával...
    // Mivel a kód hosszú, ez az alapváz. 
    // Kezdjem el beleírni a pontos matematikai számolást és a gomb-átalakulást?
</script>
</body>
</html>
