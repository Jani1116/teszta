<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Tészta Pro 2026</title>
    <style>
        :root { --bg: #000; --glass: rgba(28,28,30,0.6); --border: rgba(255,255,255,0.08); --accent: #30d158; --text: #fff; --gray: #8e8e93; --danger: #ff453a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; min-height: 90vh; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        h1 { font-size: 22px; margin: 0; font-weight: 800; }
        .icon-btn { background: none; border: none; color: var(--accent); font-size: 32px; cursor: pointer; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 18px; border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; }
        .pasta-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .main-btn { flex-grow: 1; background: var(--glass); color: var(--text); border: 1px solid var(--border); padding: 16px; border-radius: 16px; font-weight: 600; text-align: left; }
        .settings-btn { background: none; border: none; color: var(--gray); font-size: 24px; padding: 10px; cursor: pointer; }
        .list-row { display: grid; grid-template-columns: 1.3fr 1fr 1fr 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
        .input-wrap { position: relative; display: flex; }
        .unit-label { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--gray); pointer-events: none; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px 25px 12px 8px; border-radius: 12px; outline: none; text-align: center; width: 100%; font-size: 14px; }
        
        .summary-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 15px; border-radius: 24px 24px 0 0; z-index: 100; }
        .summary-header { display: grid; grid-template-columns: 1.2fr 1fr 1fr; font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 8px; font-size: 10px; color: var(--gray); }
        .summary-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; }
        .v-orig { color: var(--text); text-align: right; padding-right: 8px; opacity: 0.9; }
        .v-round { color: var(--accent); text-align: right; font-weight: 800; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 4px; }
        
        .hidden { display: none !important; }
        .round-opt { font-size: 14px; color: var(--gray); padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid transparent; flex: 1; text-align: center; }
        .round-opt.active { color: var(--accent); background: rgba(48,209,88,0.15); border-color: var(--accent); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1c1c1e; padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        .menu-btn { width: 100%; padding: 16px; margin: 6px 0; border-radius: 14px; border: 1px solid var(--border); background: var(--glass); color: white; font-weight: bold; }
        .recipe-edit-row { display: grid; grid-template-columns: 1.5fr 1fr 40px; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loading-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:3000;">SZINKRONIZÁLÁS...</div>
<div id="modal-overlay" class="modal hidden"></div>

<div id="login-screen" class="container" style="justify-content: center; height: 85vh;">
    <h1 style="text-align:center; margin-bottom:20px;">TÉSZTA PRO</h1>
    <input type="text" id="login-user" placeholder="Felhasználónév" style="margin-bottom:10px;">
    <input type="password" id="login-pass" placeholder="Jelszó" style="margin-bottom:10px;">
    <button onclick="handleLogin()" style="background:var(--accent); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">BELÉPÉS</button>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="header-bar">
        <button id="back-btn" class="hidden" onclick="goHome()" style="background:none; border:none; color:var(--accent); font-size:24px;">❮</button>
        <h1 id="main-title">Tészták</h1>
        <button class="icon-btn" onclick="headerAdd()">+</button>
    </div>
    
    <div id="view-main"><div id="pasta-list"></div></div>
    
    <div id="view-details" class="hidden" style="padding-bottom: 300px;">
        <div class="card" style="display:flex; justify-content:space-around; align-items:center; gap:10px;">
            <div class="round-opt" id="l05" onclick="setRound(0.5)">0.5 kg</div>
            <div class="round-opt" id="l10" onclick="setRound(1.0)">1.0 kg</div>
            <div id="stepper" class="hidden" style="display:flex; align-items:center; gap:15px;">
                <button onclick="modifyOffset(-1)" style="color:var(--accent); background:none; border:none; font-size:24px;">−</button>
                <span id="offset-lbl" style="color:var(--accent); font-weight:bold;">+0</span>
                <button onclick="modifyOffset(1)" style="color:var(--accent); background:none; border:none; font-size:24px;">+</button>
            </div>
        </div>
        <div id="rows-container"></div>
        <div id="summary-panel" class="summary-panel hidden"></div>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('teszta_session'));
    let db = {};
    let state = { view: 'main', activeId: null, round: null, offset: 0 };

    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return;
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}shopping_users/${u}.json`);
            let s = await res.json();
            if (s && String(s).replace(/"/g, '') === String(p)) {
                currentUser = { name: u };
                localStorage.setItem('teszta_session', JSON.stringify(currentUser));
                initApp();
            } else alert("Hiba!");
        } catch (e) { alert("Hálózati hiba!"); }
        showLoading(false);
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadData();
    }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`);
            db = await res.json() || {};
            render();
        } catch(e) {}
        showLoading(false);
    }

    async function saveData() {
        showLoading(true);
        await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`, { method: 'PUT', body: JSON.stringify(db) });
        showLoading(false);
        render();
    }

    function headerAdd() {
        if (state.view === 'main') {
            const n = prompt("Tészta neve:");
            if (!n) return;
            const id = "t" + Date.now();
            db[id] = { name: n, items: [], recipe: [{name:"Liszt", perc:100}, {name:"Víz", perc:60}, {name:"Só", perc:2}] };
            saveData();
        } else {
            const n = prompt("Termék neve:");
            if (!n) return;
            db[state.activeId].items.push({ name: n, suly: 100, db: 1 });
            saveData();
        }
    }

    function openSettings(id) {
        state.activeId = id;
        const modal = document.getElementById('modal-overlay');
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${db[id].name}</h3>
                <button class="menu-btn" onclick="renamePasta('${id}')">Átnevezés</button>
                <button class="menu-btn" onclick="editRecipe('${id}')">Recept szerkesztése</button>
                <button class="menu-btn" onclick="deletePasta('${id}')" style="color:var(--danger)">Törlés</button>
                <button class="menu-btn" onclick="closeModal()">Mégse</button>
            </div>
        `;
        modal.classList.remove('hidden');
    }

    function editRecipe(id) {
        const p = db[id];
        const modal = document.getElementById('modal-overlay');
        let rows = `<div style="font-size:11px; color:var(--gray); display:grid; grid-template-columns:1.5fr 1fr 40px; margin-bottom:5px;"><span>ANYAG</span><span>%</span><span></span></div>`;
        p.recipe.forEach((ing, i) => {
            rows += `<div class="recipe-edit-row">
                <input type="text" value="${ing.name}" onchange="db['${id}'].recipe[${i}].name=this.value; saveData();">
                <input type="number" inputmode="decimal" value="${ing.perc}" onchange="db['${id}'].recipe[${i}].perc=parseFloat(this.value)||0; saveData();">
                <button onclick="db['${id}'].recipe.splice(${i},1); saveData(); editRecipe('${id}')" style="background:none; border:none; color:var(--danger); font-size:20px;">×</button>
            </div>`;
        });
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Recept: ${p.name}</h3>
                <div style="max-height:300px; overflow-y:auto; margin-bottom:15px;">${rows}</div>
                <button class="menu-btn" onclick="db['${id}'].recipe.push({name:'Új', perc:0}); saveData(); editRecipe('${id}')" style="color:var(--accent)">+ Új összetevő</button>
                <button class="menu-btn" onclick="closeModal(); render();">KÉSZ</button>
            </div>
        `;
        modal.classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
    function renamePasta(id) { const n = prompt("Új név:", db[id].name); if(n) {db[id].name=n; saveData();} closeModal(); }
    function deletePasta(id) { if(confirm("Törlöd?")) {delete db[id]; saveData();} closeModal(); }

    function updateItem(idx, field, val) {
        db[state.activeId].items[idx][field] = parseFloat(val) || 0;
        saveData();
    }

    function render() {
        if (state.view === 'main') {
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('view-details').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('summary-panel').classList.add('hidden');
            document.getElementById('main-title').innerText = "Tészták";
            let h = '';
            Object.keys(db).forEach(id => {
                h += `<div class="pasta-item"><button class="main-btn" onclick="openCalc('${id}')">${db[id].name}</button><button class="settings-btn" onclick="openSettings('${id}')">⚙️</button></div>`;
            });
            document.getElementById('pasta-list').innerHTML = h;
        } else {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('summary-panel').classList.remove('hidden');
            const p = db[state.activeId];
            document.getElementById('main-title').innerText = p.name;
            let h = '';
            p.items.forEach((it, i) => {
                h += `<div class="list-row">
                    <div style="font-size:12px; font-weight:bold;">${it.name}</div>
                    <div class="input-wrap"><input type="number" inputmode="decimal" value="${it.suly}" onchange="updateItem(${i},'suly',this.value)"><span class="unit-label">dkg</span></div>
                    <div class="input-wrap"><input type="number" inputmode="decimal" value="${it.db}" onchange="updateItem(${i},'db',this.value)"><span class="unit-label">db</span></div>
                    <button onclick="db[state.activeId].items.splice(${i},1); saveData();" style="color:var(--danger); background:none; border:none; font-size:24px;">−</button>
                </div>`;
            });
            document.getElementById('rows-container').innerHTML = h;
            doCalc();
        }
    }

    function doCalc() {
        const p = db[state.activeId];
        if (!p || p.recipe.length === 0) return;

        let totalDkg = 0;
        p.items.forEach(it => totalDkg += (it.suly * it.db));
        let totalKg = totalDkg / 100; // Összsúly kg-ban
        
        let sumPerc = 0;
        p.recipe.forEach(r => sumPerc += r.perc);
        
        // Pék-százalék: 1 egység súlya = Összsúly / Összarány (pl. 69kg / 1.64)
        let oneUnitKg = totalKg / sumPerc;

        let finalUnitKg = oneUnitKg;
        if (state.round) {
            let lisztPerc = p.recipe[0].perc; // A liszt az első elem
            let targetLisztKg = Math.ceil((oneUnitKg * lisztPerc) / state.round) * state.round;
            finalUnitKg = (targetLisztKg + (state.offset * state.round)) / lisztPerc;
        }

        let totalCalculatedKg = finalUnitKg * sumPerc;
        
        let h = `<div class="summary-header">
                    <span>ANYAGOK</span>
                    <span style="text-align:right;">PONTOS (${totalKg.toFixed(2)}kg)</span>
                    <span style="text-align:right; color:var(--accent)">KEREK (${totalCalculatedKg.toFixed(2)}kg)</span>
                 </div>`;

        p.recipe.forEach(ing => {
            let origVal = (oneUnitKg * ing.perc).toFixed(3);
            let roundVal = (finalUnitKg * ing.perc).toFixed(3);
            h += `<div class="summary-row">
                    <span>${ing.name} (${ing.perc}%)</span>
                    <span class="v-orig">${origVal} kg</span>
                    <span class="v-round">${state.round ? roundVal + ' kg' : '-'}</span>
                  </div>`;
        });

        document.getElementById('summary-panel').innerHTML = h;
        document.getElementById('stepper').classList.toggle('hidden', !state.round);
        if(state.round) {
            document.getElementById('offset-lbl').innerText = (state.offset >= 0 ? "+" : "") + (state.offset * state.round).toFixed(1) + " kg";
            document.getElementById('l05').className = state.round === 0.5 ? "round-opt active" : "round-opt";
            document.getElementById('l10').className = state.round === 1.0 ? "round-opt active" : "round-opt";
        }
    }

    function openCalc(id) { state.activeId = id; state.view = 'details'; render(); }
    function goHome() { state.view = 'main'; state.round = null; state.offset = 0; render(); }
    function setRound(v) { state.round = (state.round === v) ? null : v; state.offset = 0; render(); }
    function modifyOffset(v) { state.offset += v; render(); }

    if(currentUser) initApp();
</script>
</body>
</html>
