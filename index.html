<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA aktív"));
      }
    </script>

    <title>Elite Tészta Pro 2026</title>
    <style>
        :root { --bg: #000; --glass: rgba(28,28,30,0.7); --border: rgba(255,255,255,0.1); --accent: #30d158; --text: #fff; --gray: #8e8e93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; }
        h1 { font-size: 24px; margin: 0; font-weight: 800; color: var(--accent); }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 12px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 12px; color: var(--gray); text-transform: uppercase; font-weight: bold; }
        input { background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 14px; width: 100%; font-size: 16px; margin-top: 5px; text-align: center; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .summary-panel { background: rgba(15,15,15,0.95); border-radius: 25px; padding: 20px; border: 1px solid var(--border); }
        .summary-header { display: grid; grid-template-columns: 1.5fr 1fr; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; font-size: 11px; color: var(--gray); }
        .summary-row { display: grid; grid-template-columns: 1.5fr 1fr; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .val { text-align: right; font-weight: 800; color: var(--accent); font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Elite Tészta Pro</h1>
    </div>
    
    <div class="card">
        <div class="input-grid">
            <div>
                <label>Súly (dkg/db)</label>
                <input type="number" id="suly" value="115" oninput="doCalc()">
            </div>
            <div>
                <label>Mennyiség (db)</label>
                <input type="number" id="db" value="30" oninput="doCalc()">
            </div>
        </div>
    </div>

    <div class="summary-panel" id="eredmeny">
        </div>
</div>

<script>
    function doCalc() {
        const sulyDkg = parseFloat(document.getElementById('suly').value) || 0;
        const darab = parseFloat(document.getElementById('db').value) || 0;
        
        // 1. Összsúly kiszámítása kg-ban
        const osszSulyKg = (sulyDkg * darab) / 100; //
        
        // 2. Recept (Pék-százalék: Liszt mindig 100%)
        const recept = [
            { nev: "Liszt", perc: 100 },
            { nev: "Víz", perc: 60 },
            { nev: "Só", perc: 2 },
            { nev: "Élesztő", perc: 2 }
        ];
        
        // 3. Össz százalék (100+60+2+2 = 164%)
        const osszPerc = recept.reduce((sum, item) => sum + item.perc, 0);
        
        // 4. Az alap egység kiszámítása (Összsúly / Össz százalék)
        const alapEgyEgyseg = osszSulyKg / osszPerc;

        let html = `
            <div class="summary-header">
                <span>ANYAGOK</span>
                <span style="text-align:right;">PONTOS (${osszSulyKg.toFixed(2)} kg)</span>
            </div>`;

        recept.forEach(item => {
            // Itt a javított matek: az alap egységet szorozzuk az összetevő százalékával
            const kg = (alapEgyEgyseg * item.perc).toFixed(3);
            html += `
                <div class="summary-row">
                    <span>${item.nev} (${item.perc}%)</span>
                    <span class="val">${kg} kg</span>
                </div>`;
        });

        document.getElementById('eredmeny').innerHTML = html;
    }

    // Indításkor azonnal számoljon egyet
    doCalc();
</script>

</body>
</html>
