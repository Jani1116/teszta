<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TÉSZTA PRO</title>
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff;
            --accent: #007aff; --border: #2c2c2e; --danger: #ff453a; 
            --zebra: #1a2a3a; /* Halvány kék a soroknak */
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; }
        
        /* Fejléc */
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; }
        .add-btn { position: absolute; right: 20px; font-size: 28px; color: var(--accent); cursor: pointer; }
        .back-btn { position: absolute; left: 20px; color: var(--accent); cursor: pointer; font-size: 16px; }

        .container { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 220px; }
        
        /* Táblázat és Oszlopok */
        .list-row { display: grid; padding: 10px 5px; border-bottom: 1px solid var(--border); align-items: center; gap: 8px; }
        .list-row:nth-child(even) { background-color: var(--zebra); }
        
        /* Oszlop igazítások */
        .grid-main { grid-template-columns: 1fr; }
        .grid-recipe { grid-template-columns: 2fr 1fr 45px; }
        .grid-calc { grid-template-columns: 2fr 1fr 1fr 45px; }

        .data-btn { background: var(--card); border: 1px solid var(--border); color: #fff; padding: 12px 8px; border-radius: 8px; text-align: left; font-size: 14px; min-height: 44px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .num-val { text-align: center; font-weight: bold; }

        /* Műveleti gombok a sor végén */
        .row-op { background: none; border: none; color: var(--danger); font-size: 20px; font-weight: bold; cursor: pointer; }
        .row-add { color: var(--accent); }

        /* Összesítő panel */
        .summary-panel { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 2px solid var(--accent); padding: 15px; box-sizing: border-box; max-height: 200px; overflow-y: auto; z-index: 200; }
        .summary-title { font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); margin-bottom: 8px; padding-bottom: 5px; font-size: 14px; }
        .summary-item { display: grid; grid-template-columns: 1fr 1fr; font-family: 'Courier New', monospace; padding: 4px 0; font-size: 15px; }
        .summary-item:nth-child(even) { color: #add8e6; }

        /* Modern Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; margin: 15px 0; font-size: 18px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-option { background: #3a3a3c; color: white; }
        .btn-danger { color: var(--danger); background: none; border: 1px solid var(--danger); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="back-btn" class="back-btn hidden" onclick="goHome()">❮ Vissza</div>
    <h1 id="title">TÉSZTA</h1>
    <div class="add-btn" onclick="headerAdd()">+</div>
</div>

<div id="view-main" class="container">
    <div id="pasta-list"></div>
</div>

<div id="view-details" class="container hidden">
    <div id="rows-container"></div>
    <div id="summary-panel" class="summary-panel hidden"></div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-label">Módosítás</h3>
        <input type="text" id="edit-input">
        <button class="btn btn-primary" onclick="confirmEdit()">OKÉ</button>
        <button class="btn" onclick="closeModal('edit-modal')">Mégse</button>
    </div>
</div>

<div id="options-modal" class="modal">
    <div class="modal-content">
        <h3 id="opt-pasta-name" style="margin-bottom:20px">Opciók</h3>
        <button class="btn btn-option" onclick="handleOption('rename')">Átnevezés</button>
        <button class="btn btn-option" style="color:var(--accent)" onclick="handleOption('recipe')">Szerkesztés (Recept)</button>
        <button class="btn btn-danger" onclick="handleOption('delete')">Törlés</button>
        <button class="btn" onclick="closeModal('options-modal')" style="margin-top:20px">Mégse</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('teszta_pro_db')) || {};
    let state = { view: 'main', activeId: null, editTarget: null };
    let pressTimer;

    function save() {
        localStorage.setItem('teszta_pro_db', JSON.stringify(db));
        render();
    }

    function render() {
        const mainView = document.getElementById('view-main');
        const detailView = document.getElementById('view-details');
        const backBtn = document.getElementById('back-btn');
        const summary = document.getElementById('summary-panel');
        
        if (state.view === 'main') {
            backBtn.classList.add('hidden');
            summary.classList.add('hidden');
            mainView.classList.remove('hidden');
            detailView.classList.add('hidden');
            document.getElementById('title').innerText = "TÉSZTA";
            
            const list = document.getElementById('pasta-list');
            list.innerHTML = '';
            Object.keys(db).forEach(id => {
                const div = document.createElement('div');
                div.className = 'list-row grid-main';
                div.innerHTML = `<button class="data-btn" onclick="openCalc('${id}')">${db[id].name}</button>`;
                
                // Hosszú nyomás kezelés
                div.onmousedown = div.ontouchstart = () => pressTimer = setTimeout(() => showOptions(id), 600);
                div.onmouseup = div.ontouchend = () => clearTimeout(pressTimer);
                
                list.appendChild(div);
            });
        } else {
            backBtn.classList.remove('hidden');
            mainView.classList.add('hidden');
            detailView.classList.remove('hidden');
            const p = db[state.activeId];
            const container = document.getElementById('rows-container');
            container.innerHTML = '';

            if (state.view === 'recipe') {
                document.getElementById('title').innerText = p.name + " %";
                summary.classList.add('hidden');
                p.recipe.forEach((ing, idx) => {
                    container.innerHTML += `
                        <div class="list-row grid-recipe">
                            <button class="data-btn" onclick="openEdit('recipe', ${idx}, 'name')">${ing.name}</button>
                            <button class="data-btn num-val" onclick="openEdit('recipe', ${idx}, 'perc')">${ing.perc}%</button>
                            <button class="row-op" onclick="removeRow(${idx})">−</button>
                        </div>`;
                });
            } else {
                document.getElementById('title').innerText = p.name;
                summary.classList.remove('hidden');
                p.items.forEach((item, idx) => {
                    container.innerHTML += `
                        <div class="list-row grid-calc">
                            <button class="data-btn" onclick="openEdit('items', ${idx}, 'name')">${item.name}</button>
                            <button class="data-btn num-val" onclick="openEdit('items', ${idx}, 'suly')">${item.suly} dkg</button>
                            <button class="data-btn num-val" onclick="openEdit('items', ${idx}, 'db')">${item.db} db</button>
                            <button class="row-op" onclick="removeRow(${idx})">−</button>
                        </div>`;
                });
                doCalc();
            }
        }
    }

    function headerAdd() {
        if (state.view === 'main') {
            const n = prompt("Tészta neve:");
            if (n) {
                const id = Date.now();
                db[id] = { name: n, recipe: [{name: 'Liszt', perc: 100}], items: [] };
                save();
            }
        } else if (state.view === 'recipe') {
            db[state.activeId].recipe.push({name: 'Új összetevő', perc: 0});
            save();
        } else {
            db[state.activeId].items.push({name: 'Új típus', suly: 0, db: 0});
            save();
        }
    }

    function showOptions(id) {
        state.activeId = id;
        document.getElementById('opt-pasta-name').innerText = db[id].name;
        document.getElementById('options-modal').style.display = 'flex';
    }

    function handleOption(type) {
        closeModal('options-modal');
        if (type === 'rename') {
            const n = prompt("Új név:", db[state.activeId].name);
            if (n) db[state.activeId].name = n;
        } else if (type === 'recipe') {
            state.view = 'recipe';
        } else if (type === 'delete') {
            if (confirm("Biztosan törlöd a teljes tésztát?")) delete db[state.activeId];
        }
        save();
    }

    function openEdit(list, idx, field) {
        state.editTarget = { list, idx, field };
        const val = db[state.activeId][list][idx][field];
        document.getElementById('edit-input').value = val;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function confirmEdit() {
        const val = document.getElementById('edit-input').value;
        if (confirm("Megváltoztatod?")) {
            const t = state.editTarget;
            db[state.activeId][t.list][t.idx][t.field] = val;
            closeModal('edit-modal');
            save();
        }
    }

    function removeRow(idx) {
        if (confirm("Tényleg törlöd a sort?")) {
            const list = state.view === 'recipe' ? 'recipe' : 'items';
            db[state.activeId][list].splice(idx, 1);
            save();
        }
    }

    function doCalc() {
        const p = db[state.activeId];
        let totalDkg = 0;
        p.items.forEach(i => totalDkg += (parseFloat(i.suly) * parseInt(i.db)));
        
        let totalKg = totalDkg / 100;
        let totalPerc = 0;
        p.recipe.forEach(r => totalPerc += parseFloat(r.perc));
        
        let lisztBase = (totalKg / totalPerc) * 100;

        let html = `<div class="summary-title">ÖSSZETÉTEL (${totalKg.toFixed(2)} kg tészta)</div>`;
        p.recipe.forEach(ing => {
            let kg = (lisztBase * (parseFloat(ing.perc) / 100));
            html += `<div class="summary-item"><span>${ing.name}</span> <span style="text-align:right">${kg.toFixed(3)} kg</span></div>`;
        });
        document.getElementById('summary-panel').innerHTML = html;
    }

    function openCalc(id) { state.activeId = id; state.view = 'calc'; render(); }
    function goHome() { state.view = 'main'; render(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    render();
</script>
</body>
</html>
