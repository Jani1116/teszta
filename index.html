<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Tészta Pro 2026</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --glass: rgba(28,28,30,0.6); --border: rgba(255,255,255,0.08); --accent: #30d158; --text: #fff; --gray: #8e8e93; --danger: #ff453a; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; min-height: 90vh; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        h1 { font-size: 22px; margin: 0; font-weight: 800; }
        .icon-btn { background: none; border: none; color: var(--accent); font-size: 32px; cursor: pointer; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 18px; border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; }
        .pasta-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .main-btn { flex-grow: 1; background: var(--glass); color: var(--text); border: 1px solid var(--border); padding: 16px; border-radius: 16px; font-weight: 600; text-align: left; }
        .settings-btn { background: none; border: none; color: var(--gray); font-size: 24px; padding: 10px; cursor: pointer; }
        .list-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .unit-label { position: absolute; right: 8px; font-size: 10px; color: var(--gray); pointer-events: none; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px 25px 12px 8px; border-radius: 12px; outline: none; text-align: center; width: 100%; font-size: 14px; }
        .summary-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 15px; border-radius: 24px 24px 0 0; z-index: 100; }
        .summary-header { font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 8px; }
        .summary-row { display: grid; grid-template-columns: 1.5fr 1fr; padding: 4px 0; font-size: 14px; }
        .v-round { color: var(--accent); text-align: right; font-weight: 700; }
        .hidden { display: none !important; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
        .round-opt { font-size: 14px; color: var(--gray); padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .round-opt.active { color: var(--accent); background: rgba(48,209,88,0.15); }
        /* Modal a gombokhoz */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1c1c1e; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .menu-btn { width: 100%; padding: 15px; margin: 5px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-overlay">SZINKRONIZÁLÁS...</div>
<div id="modal-overlay" class="modal hidden"></div>

<div id="login-screen" class="container" style="justify-content: center; height: 80vh;">
    <h1 style="text-align:center;">TÉSZTA PRO</h1>
    <input type="text" id="login-user" placeholder="Felhasználónév" style="margin-bottom:10px; padding-right:10px;">
    <input type="password" id="login-pass" placeholder="Jelszó" style="margin-bottom:10px; padding-right:10px;">
    <button onclick="handleLogin()" style="background:var(--accent); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">BELÉPÉS</button>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="header-bar">
        <button id="back-btn" class="hidden" onclick="goHome()" style="background:none; border:none; color:var(--accent); font-size:24px;">❮</button>
        <h1 id="main-title">Tészták</h1>
        <button class="icon-btn" onclick="headerAdd()">+</button>
    </div>
    <div id="view-main"><div id="pasta-list"></div></div>
    <div id="view-details" class="hidden" style="padding-bottom: 220px;">
        <div class="card" style="display:flex; justify-content:space-around; align-items:center;">
            <div class="round-opt" id="l05" onclick="setRound(0.5)">0.5 kg</div>
            <div class="round-opt" id="l10" onclick="setRound(1.0)">1.0 kg</div>
            <div id="stepper" class="hidden" style="display:flex; align-items:center; gap:15px;">
                <button onclick="modifyOffset(-1)" style="color:var(--accent); background:none; border:none; font-size:24px;">−</button>
                <span id="offset-lbl" style="color:var(--accent); font-weight:bold;">+0</span>
                <button onclick="modifyOffset(1)" style="color:var(--accent); background:none; border:none; font-size:24px;">+</button>
            </div>
        </div>
        <div id="rows-container"></div>
        <div id="summary-panel" class="summary-panel hidden"></div>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('teszta_session'));
    let db = {};
    let state = { view: 'main', activeId: null, round: null, offset: 0 };

    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return;
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}shopping_users/${u}.json`);
            let s = await res.json();
            if (s && String(s).replace(/"/g, '') === String(p)) {
                currentUser = { name: u };
                localStorage.setItem('teszta_session', JSON.stringify(currentUser));
                initApp();
            } else alert("Hibás adatok!");
        } catch (e) { alert("Hiba!"); }
        showLoading(false);
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadData();
    }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`);
            db = await res.json() || {};
            render();
        } catch(e) {}
        showLoading(false);
    }

    async function saveData() {
        showLoading(true);
        await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`, { method: 'PUT', body: JSON.stringify(db) });
        showLoading(false);
        render();
    }

    function headerAdd() {
        if (state.view === 'main') {
            const n = prompt("Új tészta neve:");
            if (!n) return;
            const id = "t" + Date.now();
            db[id] = { name: n, items: [], recipe: [{name:"Liszt", perc:100}, {name:"Víz", perc:60}, {name:"Só", perc:2}] };
            saveData();
        } else {
            const n = prompt("Termék neve (pl. 1 kg kenyér):");
            if (!n) return;
            db[state.activeId].items.push({ name: n, suly: 115, db: 1 });
            saveData();
        }
    }

    function openSettings(id) {
        const modal = document.getElementById('modal-overlay');
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${db[id].name}</h3>
                <button class="menu-btn" onclick="renamePasta('${id}')">Átnevezés</button>
                <button class="menu-btn" onclick="editRecipe('${id}')">Szerkesztés (recept)</button>
                <button class="menu-btn" onclick="deletePasta('${id}')" style="color:var(--danger)">Törlés</button>
                <button class="menu-btn" onclick="closeModal()" style="border:none; margin-top:10px;">Mégse</button>
            </div>
        `;
        modal.classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

    function renamePasta(id) {
        const n = prompt("Új név:", db[id].name);
        if(n) { db[id].name = n; saveData(); }
        closeModal();
    }

    function deletePasta(id) {
        if(confirm("Véglegesen törlöd a tésztát?")) { delete db[id]; saveData(); }
        closeModal();
    }

    function editRecipe(id) {
        closeModal();
        let r = db[id].recipe;
        let menu = "Recept (Liszt = 100%)\nÚj hozzáadása: név,százalék (pl: Olaj,5)\nTörlés: töröl,sorszám\nMódosítás: sorszám,név,százalék\n\n";
        r.forEach((ing, i) => menu += `${i}: ${ing.name} - ${ing.perc}%\n`);
        const val = prompt(menu);
        if (!val) return;

        const p = val.split(",");
        if (p[0] === "töröl" && r[parseInt(p[1])]) {
            r.splice(parseInt(p[1]), 1);
        } else if (p.length === 2) {
            r.push({ name: p[0], perc: parseFloat(p[1]) });
        } else if (p.length === 3) {
            const i = parseInt(p[0]);
            if(r[i]) { r[i].name = p[1]; r[i].perc = parseFloat(p[2]); }
        }
        db[id].recipe = r;
        saveData();
    }

    function updateItem(idx, field, val) {
        if (field === 'suly') {
            if (!confirm("Biztosan módosítod a súlyt?")) { render(); return; }
        }
        db[state.activeId].items[idx][field] = parseFloat(val) || 0;
        saveData();
    }

    function render() {
        if (state.view === 'main') {
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('view-details').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('summary-panel').classList.add('hidden');
            document.getElementById('main-title').innerText = "Tészták";
            let h = '';
            Object.keys(db).forEach(id => {
                h += `<div class="pasta-item"><button class="main-btn" onclick="openCalc('${id}')">${db[id].name}</button><button class="settings-btn" onclick="openSettings('${id}')">⚙️</button></div>`;
            });
            document.getElementById('pasta-list').innerHTML = h || '<div class="card">Nincs tészta. Nyomj a + gombra!</div>';
        } else {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('summary-panel').classList.remove('hidden');
            const p = db[state.activeId];
            document.getElementById('main-title').innerText = p.name;
            let h = '';
            p.items.forEach((it, i) => {
                h += `<div class="list-row">
                    <div style="font-size:12px; font-weight:bold; overflow:hidden;">${it.name}</div>
                    <div class="input-wrap"><input type="number" value="${it.suly}" readonly onclick="this.readOnly=false; this.focus()" onblur="this.readOnly=true; updateItem(${i},'suly',this.value)"><span class="unit-label">dkg</span></div>
                    <div class="input-wrap"><input type="number" value="${it.db}" onchange="updateItem(${i},'db',this.value)"><span class="unit-label">db</span></div>
                    <button onclick="db[state.activeId].items.splice(${i},1); saveData();" style="color:var(--danger); background:none; border:none; font-size:24px;">−</button>
                </div>`;
            });
            document.getElementById('rows-container').innerHTML = h;
            doCalc();
        }
    }

    function doCalc() {
        const p = db[state.activeId];
        let totalDkg = 0;
        p.items.forEach(it => totalDkg += (it.suly * it.db));
        let totalKg = totalDkg / 100; // dkg-ból kg-ba
        
        let sumPerc = 0;
        p.recipe.forEach(r => sumPerc += r.perc);
        
        // Pék-százalék alapú matek: 
        // 1% értéke kg-ban = Összsúly / Összszázalék
        let unitWeight = totalKg / sumPerc;

        // Kerekítés eltolás kezelése
        if (state.round) {
            let lisztPerc = p.recipe[0].perc; // A recept első eleme mindig a liszt (100%)
            let targetLisztKg = Math.ceil((unitWeight * lisztPerc) / state.round) * state.round;
            unitWeight = (targetLisztKg + (state.offset * state.round)) / lisztPerc;
        }

        let finalTotalKg = unitWeight * sumPerc;
        let h = `<div class="summary-header"><span>ÖSSZETÉTEL (${finalTotalKg.toFixed(2)} kg)</span></div>`;
        p.recipe.forEach(ing => {
            h += `<div class="summary-row"><span>${ing.name} (${ing.perc}%)</span><span class="v-round">${(unitWeight * ing.perc).toFixed(3)} kg</span></div>`;
        });
        document.getElementById('summary-panel').innerHTML = h;
        
        document.getElementById('stepper').classList.toggle('hidden', !state.round);
        if(state.round) {
            document.getElementById('offset-lbl').innerText = (state.offset >= 0 ? "+" : "") + (state.offset * state.round).toFixed(1) + " kg";
            document.getElementById('l05').className = state.round === 0.5 ? "round-opt active" : "round-opt";
            document.getElementById('l10').className = state.round === 1.0 ? "round-opt active" : "round-opt";
        }
    }

    function openCalc(id) { state.activeId = id; state.view = 'details'; render(); }
    function goHome() { state.view = 'main'; state.round = null; state.offset = 0; render(); }
    function setRound(v) { state.round = (state.round === v) ? null : v; state.offset = 0; render(); }
    function modifyOffset(v) { state.offset += v; render(); }

    if(currentUser) initApp();
</script>
</body>
</html>
