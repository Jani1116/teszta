<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <title>Elite Tészta Pro 2026</title>
    <style>
        :root { --bg: #000; --glass: rgba(28,28,30,0.6); --border: rgba(255,255,255,0.08); --accent: #30d158; --text: #fff; --gray: #8e8e93; --danger: #ff453a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; min-height: 95vh; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; }
        h1 { font-size: 24px; margin: 0; font-weight: 800; }
        .icon-btn { background: none; border: none; color: var(--accent); font-size: 32px; cursor: pointer; padding: 5px 15px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; }
        .main-btn { width: 100%; background: var(--glass); color: var(--text); border: 1px solid var(--border); padding: 18px; border-radius: 18px; font-weight: 600; text-align: left; margin-bottom: 10px; font-size: 16px; }
        .list-row { display: grid; grid-template-columns: 1.3fr 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; align-items: center; }
        input { background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; width: 100%; text-align: center; }
        .summary-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: rgba(15,15,15,0.95); backdrop-filter: blur(25px); border-top: 1px solid var(--border); padding: 20px; border-radius: 28px 28px 0 0; z-index: 100; }
        .summary-row { display: grid; grid-template-columns: 1.2fr 1fr; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .v-round { color: var(--accent); text-align: right; font-weight: 800; font-family: monospace; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="justify-content: center;">
    <h1 style="text-align:center; margin-bottom:30px;">Tészta Pro Belépés</h1>
    <input type="text" id="login-user" placeholder="Felhasználónév" style="margin-bottom:10px;">
    <input type="password" id="login-pass" placeholder="Jelszó" style="margin-bottom:20px;">
    <button onclick="handleLogin()" style="background:var(--accent); color:black; border:none; padding:18px; border-radius:15px; font-weight:800; width:100%;">BELÉPÉS</button>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="header-bar">
        <button id="back-btn" class="hidden" onclick="goHome()" style="background:none; border:none; color:var(--accent); font-size:25px;">❮</button>
        <h1 id="main-title">Receptek</h1>
        <button class="icon-btn" onclick="addNew()">+</button>
    </div>
    
    <div id="view-main">
        <div id="pasta-list"></div>
    </div>
    
    <div id="view-details" class="hidden" style="padding-bottom: 300px;">
        <div id="rows-container"></div>
        <div id="summary-panel" class="summary-panel hidden"></div>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('teszta_session'));
    let db = {};
    let activeId = null;

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const res = await fetch(`${DB_URL}shopping_users/${u}.json`);
        let s = await res.json();
        if (s && String(s).replace(/"/g, '') === String(p)) {
            currentUser = { name: u };
            localStorage.setItem('teszta_session', JSON.stringify(currentUser));
            initApp();
        } else alert("Hiba!");
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadData();
    }

    async function loadData() {
        const res = await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`);
        db = await res.json() || {};
        render();
    }

    async function saveData() {
        await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`, { method: 'PUT', body: JSON.stringify(db) });
        render();
    }

    function addNew() {
        const n = prompt(activeId ? "Termék neve:" : "Recept neve:");
        if (!n) return;
        if (!activeId) {
            const id = "t" + Date.now();
            db[id] = { name: n, items: [], recipe: [{name:"Liszt", perc:100}, {name:"Víz", perc:60}, {name:"Só", perc:2}, {name:"Élesztő", perc:2}] };
        } else {
            db[activeId].items.push({ name: n, suly: 100, db: 1 });
        }
        saveData();
    }

    function render() {
        const main = document.getElementById('view-main');
        const det = document.getElementById('view-details');
        const back = document.getElementById('back-btn');
        const sum = document.getElementById('summary-panel');

        if (!activeId) {
            main.classList.remove('hidden'); det.classList.add('hidden'); back.classList.add('hidden'); sum.classList.add('hidden');
            document.getElementById('main-title').innerText = "Receptek";
            let h = '';
            Object.keys(db).forEach(id => {
                h += `<button class="main-btn" onclick="openCalc('${id}')">${db[id].name}</button>`;
            });
            document.getElementById('pasta-list').innerHTML = h;
        } else {
            main.classList.add('hidden'); det.classList.remove('hidden'); back.classList.remove('hidden'); sum.classList.remove('hidden');
            const p = db[activeId];
            document.getElementById('main-title').innerText = p.name;
            let h = '';
            p.items.forEach((it, i) => {
                h += `<div class="list-row">
                    <span style="font-size:12px;">${it.name}</span>
                    <input type="number" value="${it.suly}" onchange="db['${activeId}'].items[${i}].suly=this.value; saveData();">
                    <input type="number" value="${it.db}" onchange="db['${activeId}'].items[${i}].db=this.value; saveData();">
                    <button onclick="db['${activeId}'].items.splice(${i},1); saveData();" style="color:var(--danger); background:none; border:none; font-size:20px;">×</button>
                </div>`;
            });
            document.getElementById('rows-container').innerHTML = h;
            doCalc();
        }
    }

    function doCalc() {
        const p = db[activeId];
        let totalDkg = 0;
        p.items.forEach(it => totalDkg += (it.suly * it.db));
        let totalKg = totalDkg / 100; //

        let sumPerc = p.recipe.reduce((a, b) => a + b.perc, 0);
        let baseOne = totalKg / sumPerc;

        let h = `<div style="font-size:11px; color:var(--gray); margin-bottom:10px;">ÖSSZSÚLY: ${totalKg.toFixed(2)} kg</div>`;
        p.recipe.forEach(r => {
            let kg = (baseOne * r.perc).toFixed(3);
            h += `<div class="summary-row"><span>${r.name} (${r.perc}%)</span><span class="v-round">${kg} kg</span></div>`;
        });
        document.getElementById('summary-panel').innerHTML = h;
    }

    function openCalc(id) { activeId = id; render(); }
    function goHome() { activeId = null; render(); }

    if(currentUser) initApp();
</script>
</body>
</html>
