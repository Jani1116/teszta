<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TÉSZTA - Admin</title>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff;
            --accent: #007aff; --border: #2c2c2e; --danger: #ff453a;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); overflow-x: hidden; }
        
        /* Fejléc */
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .add-btn { position: absolute; right: 20px; font-size: 30px; color: var(--accent); cursor: pointer; user-select: none; }

        /* Lista */
        .list-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - 70px); overflow-y: auto; }
        .pasta-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); font-size: 18px; text-align: center; transition: 0.2s; -webkit-touch-callout: none; user-select: none; }
        .pasta-card:active { transform: scale(0.98); background: #2c2c2e; }

        /* Modal / Ablakok */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; border: 1px solid var(--border); text-align: center; }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; font-size: 16px; margin: 15px 0; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: none; color: var(--text); }
        .btn-danger { color: var(--danger); }

        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-overlay">Szinkronizálás...</div>

<div class="header">
    <h1>TÉSZTA</h1>
    <div class="add-btn" onclick="openAddModal()">+</div>
</div>

<div class="list-container" id="pasta-list">
    </div>

<div id="pasta-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">Új tészta</h3>
        <input type="text" id="pasta-name" placeholder="Tészta neve (pl. Kifli)">
        <button class="btn btn-primary" onclick="savePasta()">OKÉ</button>
        <button class="btn btn-secondary" onclick="closeModal('pasta-modal')">Mégse</button>
    </div>
</div>

<div id="options-modal" class="modal">
    <div class="modal-content">
        <h3 id="selected-pasta-label">Opciók</h3>
        <button class="btn btn-primary" onclick="editPasta()">Szerkesztés</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Törlés</button>
        <button class="btn btn-secondary" onclick="closeModal('options-modal')">Vissza</button>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/tesztak.json";
    let pastas = [];
    let selectedId = null;
    let pressTimer;

    // Betöltés
    async function loadPastas() {
        showLoading(true);
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            pastas = data ? Object.keys(data).map(id => ({ id, name: data[id].name })) : [];
            render();
        } catch (e) { console.error("Hiba:", e); }
        showLoading(false);
    }

    // Megjelenítés
    function render() {
        const list = document.getElementById('pasta-list');
        list.innerHTML = '';
        pastas.forEach(p => {
            const div = document.createElement('div');
            div.className = 'pasta-card';
            div.innerText = p.name;
            
            // Hosszú nyomás események (mobil & desktop)
            div.onmousedown = () => startPress(p.id, p.name);
            div.onmouseup = () => clearTimeout(pressTimer);
            div.ontouchstart = () => startPress(p.id, p.name);
            div.ontouchend = () => clearTimeout(pressTimer);
            
            list.appendChild(div);
        });
    }

    // Hosszú nyomás kezelése
    function startPress(id, name) {
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            selectedId = id;
            document.getElementById('selected-pasta-label').innerText = name;
            document.getElementById('options-modal').style.display = 'flex';
        }, 600); // 0.6 másodperc a hosszú nyomás
    }

    // Mentés (Új vagy Szerkesztés)
    async function savePasta() {
        const name = document.getElementById('pasta-name').value.trim();
        if(!name) return;
        
        showLoading(true);
        const url = selectedId ? DB_URL.replace(".json", `/${selectedId}.json`) : DB_URL;
        const method = selectedId ? 'PATCH' : 'POST';
        
        await fetch(url, { method, body: JSON.stringify({ name }) });
        
        document.getElementById('pasta-name').value = '';
        closeModal('pasta-modal');
        await loadPastas();
    }

    // Törlés
    async function confirmDelete() {
        if(confirm("Biztosan törlöd?")) {
            showLoading(true);
            await fetch(DB_URL.replace(".json", `/${selectedId}.json`), { method: 'DELETE' });
            closeModal('options-modal');
            await loadPastas();
        }
    }

    // Segédfunkciók
    function openAddModal() {
        selectedId = null;
        document.getElementById('modal-title').innerText = "Új tészta";
        document.getElementById('pasta-name').value = '';
        document.getElementById('pasta-modal').style.display = 'flex';
    }

    function editPasta() {
        const p = pastas.find(x => x.id === selectedId);
        document.getElementById('modal-title').innerText = "Szerkesztés";
        document.getElementById('pasta-name').value = p.name;
        closeModal('options-modal');
        document.getElementById('pasta-modal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }

    // Indítás
    loadPastas();
</script>

</body>
</html>
