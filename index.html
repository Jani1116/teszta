<!DOCTYPE html>
<html lang="hu">
<head>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Tészta Pro 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --accent: #30d158; --gray: #8e8e93; --red: #ff453a; --card: #1c1c1e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; }
        h1 { font-size: 22px; text-align: center; margin: 10px 0; font-weight: 800; }
        .main-btn { width: 100%; background: transparent; color: var(--accent); border: 1.5px solid var(--accent); padding: 14px; border-radius: 16px; font-weight: 700; margin-bottom: 8px; }
        
        /* Kerekítés Panel */
        .round-box { background: #111; padding: 12px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .round-opts { display: flex; gap: 15px; }
        .round-opt { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: bold; color: var(--gray); cursor: pointer; }
        .round-opt.active { color: var(--accent); }
        .step-ui { display: flex; align-items: center; gap: 10px; }
        .step-btn { background: var(--card); border: 1.2px solid var(--accent); color: var(--accent); width: 38px; height: 38px; border-radius: 10px; font-size: 22px; font-weight: bold; }

        /* Lista Sorok */
        .list-row { background: rgba(255,255,255,0.07); padding: 10px; border-radius: 14px; margin-bottom: 6px; display: grid; gap: 8px; align-items: center; }
        .grid-calc { grid-template-columns: 1.8fr 1fr 1fr 40px; }
        .data-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 5px; border-radius: 10px; text-align: center; font-size: 14px; }
        
        /* Összetétel Panel */
        .summary-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #050505; border-top: 2px solid var(--accent); padding: 15px; border-radius: 20px 20px 0 0; z-index: 100; box-sizing: border-box; }
        .summary-header { font-weight: bold; color: var(--accent); font-size: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(48,209,88,0.2); padding-bottom: 5px; }
        .summary-row { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; padding: 5px 0; font-family: monospace; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .v-orig { color: var(--gray); text-align: right; font-size: 13px; padding-right: 5px; }
        .v-round { color: var(--accent); text-align: right; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app-content" class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button id="back-btn" class="hidden" onclick="goHome()" style="background:none; border:none; color:var(--accent); font-size:24px;">❮</button>
        <h1 id="main-title">Tészták</h1>
        <button onclick="headerAdd()" style="background:none; border:none; color:var(--accent); font-size:32px;">+</button>
    </div>

    <div id="view-main"><div id="pasta-list"></div></div>

    <div id="view-details" class="hidden">
        <div id="round-ui" class="round-box">
            <div class="round-opts">
                <label class="round-opt" id="l05"><input type="checkbox" id="c05" onchange="setRound(0.5)"> 0.5 kg</label>
                <label class="round-opt" id="l10"><input type="checkbox" id="c10" onchange="setRound(1.0)"> 1.0 kg</label>
            </div>
            <div id="stepper" class="step-ui hidden">
                <button class="step-btn" onclick="modifyOffset(-1)">-</button>
                <span id="offset-lbl" style="color:var(--accent); font-weight:bold; min-width:45px; text-align:center;">+0 kg</span>
                <button class="step-btn" onclick="modifyOffset(1)">+</button>
            </div>
        </div>
        <div id="rows-container" style="padding-bottom: 240px;"></div>
        <div id="summary-panel" class="summary-panel hidden"></div>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('teszta_session'));
    let db = {};
    let state = { view: 'main', activeId: null, round: null, offset: 0 };

    async function loadData() {
        const res = await fetch(`${DB_URL}teszta_v2/${currentUser.name}.json`);
        db = await res.json() || {};
        render();
    }

    function setRound(val) {
        if (state.round === val) { state.round = null; state.offset = 0; }
        else { 
            state.round = val; state.offset = 0;
            document.getElementById(val === 0.5 ? 'c10' : 'c05').checked = false;
        }
        render();
    }

    function modifyOffset(dir) { state.offset += dir; render(); }

    function doCalc() {
        const p = db[state.activeId];
        if (!p || !p.recipe || p.recipe.length === 0) return;

        let totalSulyDk = 0;
        (p.items || []).forEach(i => totalSulyDk += (parseFloat(i.suly) * parseFloat(i.db)));
        let kgOrig = totalSulyDk / 100;

        let recipeSumPerc = 0;
        p.recipe.forEach(r => recipeSumPerc += parseFloat(r.perc));
        let unitOrig = recipeSumPerc > 0 ? (kgOrig / recipeSumPerc) : 0;

        // Kerekítés alapja: az első sor (Liszt)
        let lisztPerc = parseFloat(p.recipe[0].perc);
        let lisztKgOrig = unitOrig * lisztPerc;
        
        let unitFinal = unitOrig;
        let isActive = state.round !== null;

        if (isActive) {
            let base = Math.ceil(lisztKgOrig / state.round) * state.round;
            let lisztKgFinal = base + (state.offset * state.round);
            unitFinal = lisztPerc > 0 ? (lisztKgFinal / lisztPerc) : 0;
        }

        let kgFinalTotal = unitFinal * recipeSumPerc;
        let diff = kgFinalTotal - kgOrig;

        let h = `<div class="summary-header">
            <span>ÖSSZETÉTEL (${kgOrig.toFixed(2)} kg)</span>
            ${isActive ? `<span style="color:var(--accent)">+ (${diff.toFixed(2)} kg tészta)</span>` : ''}
        </div>`;

        p.recipe.forEach(ing => {
            let oS = unitOrig * parseFloat(ing.perc);
            let rS = unitFinal * parseFloat(ing.perc);
            h += `<div class="summary-row">
                <span>${ing.name}</span>
                <span class="v-orig">${isActive ? oS.toFixed(3) + ' kg' : ''}</span>
                <span class="v-round">${rS.toFixed(3)} kg</span>
            </div>`;
        });

        document.getElementById('summary-panel').innerHTML = h;
        document.getElementById('stepper').classList.toggle('hidden', !isActive);
        if(isActive) {
            document.getElementById('offset-lbl').innerText = (state.offset >= 0 ? "+" : "") + (state.offset * state.round).toFixed(1) + " kg";
            document.getElementById('l05').className = state.round === 0.5 ? "round-opt active" : "round-opt";
            document.getElementById('l10').className = state.round === 1.0 ? "round-opt active" : "round-opt";
        }
    }

    function render() {
        if (state.view === 'main') {
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('view-details').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('main-title').innerText = "Tészták";
            let h = '';
            Object.keys(db).sort().forEach(id => {
                h += `<div class="list-row"><button class="data-btn" onclick="openCalc('${id}')" style="font-weight:bold; text-align:left; padding-left:15px; border-left:4px solid var(--accent)">${db[id].name}</button></div>`;
            });
            document.getElementById('pasta-list').innerHTML = h;
        } else {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('summary-panel').classList.remove('hidden');
            const p = db[state.activeId];
            document.getElementById('main-title').innerText = p.name;
            
            let h = '';
            (p.items || []).forEach((it, i) => {
                h += `<div class="list-row grid-calc">
                    <div class="data-btn">${it.name}</div>
                    <div class="data-btn" style="color:var(--accent)">${it.suly} dk</div>
                    <div class="data-btn" style="color:var(--accent)">${it.db} db</div>
                    <button onclick="delRow(${i})" style="background:none; border:none; color:var(--red); font-size:20px;">−</button>
                </div>`;
            });
            document.getElementById('rows-container').innerHTML = h;
            doCalc();
        }
    }

    function openCalc(id) { state.activeId = id; state.view = 'details'; render(); }
    function goHome() { state.view = 'main'; render(); }
    function logout() { localStorage.removeItem('teszta_session'); location.reload(); }
    
    // Kezdés
    if(currentUser) {
        document.getElementById('app-content').style.display = 'block';
        loadData();
    }
</script>
</body>
</html>
