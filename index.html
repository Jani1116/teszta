<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tészta Mester Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #000; --glass: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1); --accent: #ff9f0a;
            --text: #fff; --success: #30d158; --gray: #8e8e93; --danger: #ff453a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 500px; margin: auto; background: var(--glass); backdrop-filter: blur(15px); padding: 15px; border-radius: 25px; border: 1px solid var(--border); min-height: 94vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; color: var(--accent); font-size: 18px; }
        .item-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 10px; outline: none; text-align: center; }
        .qty-input { width: 60px; font-weight: bold; border-color: var(--accent); color: var(--accent); font-size: 16px; }
        .main-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 15px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .add-btn { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: #1c1c1e; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        .hidden { display: none; }
        .calc-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .calc-table td { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .mod-val { color: var(--accent); font-weight: bold; text-align: right; }
        .round-panel { background: rgba(255,159,10,0.1); padding: 12px; border-radius: 15px; border: 1px solid var(--accent); margin: 15px 0; }
        .step-btn { background: var(--accent); border: none; color: white; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--accent); }
    </style>
</head>
<body>

<div id="loading-overlay">FRISSÍTÉS...</div>

<div id="login-screen" class="container" style="justify-content: center;">
    <h1 style="text-align:center; color:var(--accent)">TÉSZTA MESTER</h1>
    <input type="text" id="login-user" placeholder="Felhasználónév" value="Jani" style="width:100%; margin-bottom:10px;">
    <input type="password" id="login-pass" placeholder="Jelszó" style="width:100%; margin-bottom:10px;">
    <button class="main-btn" onclick="handleLogin()">BELÉPÉS</button>
</div>

<div id="view-main" class="container hidden">
    <div class="header"><h2>TÉSZTÁK</h2><button class="add-btn" onclick="openModal('modal-new-dough')">+</button></div>
    <div id="dough-list"></div>
</div>

<div id="view-products" class="container hidden">
    <div class="header"><h2 id="prod-dough-name">Tészta</h2><button class="add-btn" onclick="openModal('modal-add-product')">+</button></div>
    <div id="product-list"></div>
    <div class="round-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <strong>Kerekítés (0.5kg / 50g)</strong>
            <input type="checkbox" id="round-check" style="width:25px; height:25px;" onchange="renderCalculation()">
        </div>
        <div id="calc-summary" style="font-size: 16px; font-weight: bold; border-bottom: 1px solid var(--accent); padding-bottom: 5px;"></div>
        <table class="calc-table" id="calc-body"></table>
    </div>
    <button class="main-btn" style="background:var(--gray)" onclick="showMain()">VISSZA</button>
</div>

<div id="view-recipe" class="container hidden">
    <div class="header"><div><h2 id="recipe-name">Recept</h2></div><button class="add-btn" onclick="openModal('modal-add-ingredient')">+</button></div>
    <div id="ingredient-list"></div>
    <button class="main-btn" style="background:var(--gray)" onclick="showProducts(activeId, activeName)">KÉSZ (Vissza)</button>
</div>

<div id="modal-edit-product" class="modal">
    <div class="modal-content">
        <h3>Termék módosítása</h3>
        <input type="text" id="edit-p-name" placeholder="Név" style="width:100%; margin-bottom:10px;">
        <input type="number" id="edit-p-weight" placeholder="Súly (dkg)" style="width:100%; margin-bottom:10px;">
        <button class="main-btn" onclick="updateProductData()">MENTÉS</button>
        <button class="main-btn" style="background:var(--danger)" onclick="deleteProduct()">TERMÉK TÖRLÉSE</button>
        <button class="main-btn" style="background:none" onclick="closeModal()">Mégse</button>
    </div>
</div>

<div id="modal-new-dough" class="modal"><div class="modal-content"><h3>Új tészta</h3><input type="text" id="new-dough-name" style="width:100%"><button class="main-btn" onclick="saveNewDough()">MENTÉS</button><button class="main-btn" style="background:none" onclick="closeModal()">Mégse</button></div></div>
<div id="modal-add-product" class="modal"><div class="modal-content"><h3>Új termék</h3><input type="text" id="p-name" placeholder="Név" style="width:100%"><input type="number" id="p-weight" placeholder="Súly (dkg)" style="width:100%"><input type="number" id="p-qty" placeholder="Mennyiség (db)" style="width:100%"><button class="main-btn" onclick="saveProduct()">HOZZÁADÁS</button><button class="main-btn" style="background:none" onclick="closeModal()">Mégse</button></div></div>
<div id="modal-add-ingredient" class="modal"><div class="modal-content"><h3>Új hozzávaló</h3><input type="text" id="ing-name" placeholder="Név (pl. Víz)" style="width:100%"><input type="number" id="ing-percent" placeholder="Százalék (pl. 60)" style="width:100%"><button class="main-btn" onclick="saveIngredient()">HOZZÁADÁS</button><button class="main-btn" style="background:none" onclick="closeModal()">Mégse</button></div></div>
<div id="modal-dough-menu" class="modal"><div class="modal-content"><h3 id="menu-title" style="color:var(--accent); text-align:center;">Opciók</h3><button class="main-btn" onclick="openRecipeEditor()">Recept (anyagnorma)</button><button class="main-btn" style="background:var(--danger)" onclick="deleteDough()">Törlés</button><button class="main-btn" style="background:none" onclick="closeModal()">Bezár</button></div></div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('teszta_session'));
    let activeId = "", activeName = "", manualLisztAdj = 0, currentEditPid = "";

    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}shopping_users/${u}.json`);
            let stored = await res.json();
            if (stored && String(stored).replace(/"/g, '') === p) {
                currentUser = { name: u };
                localStorage.setItem('teszta_session', JSON.stringify(currentUser));
                initApp();
            } else { alert("Hiba!"); }
        } catch (e) { alert("Szerver hiba!"); }
        showLoading(false);
    }

    function initApp() { document.getElementById('login-screen').classList.add('hidden'); showMain(); }
    function showMain() { document.querySelectorAll('.container').forEach(c => c.classList.add('hidden')); document.getElementById('view-main').classList.remove('hidden'); loadDoughs(); }

    async function loadDoughs() {
        showLoading(true);
        const res = await fetch(`${DB_URL}teszta_master/${currentUser.name}.json`);
        const data = await res.json();
        const list = document.getElementById('dough-list'); list.innerHTML = "";
        if(data) {
            Object.keys(data).sort((a,b)=>data[a].name.localeCompare(data[b].name)).forEach(id => {
                list.innerHTML += `<div class="item-card"><span onclick="showProducts('${id}', '${data[id].name}')" style="flex:1; font-weight:bold; font-size:16px;">${data[id].name}</span><button style="background:none; border:none; font-size:20px;" onclick="openDoughMenu('${id}', '${data[id].name}')">⚙️</button></div>`;
            });
        }
        showLoading(false);
    }

    async function showProducts(id, name) {
        activeId = id; activeName = name; manualLisztAdj = 0;
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-products').classList.remove('hidden');
        document.getElementById('prod-dough-name').innerText = name;
        renderCalculation();
    }

    async function renderCalculation() {
        const res = await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}.json`);
        const data = await res.json();
        let totalNeededKg = 0;
        const prodList = document.getElementById('product-list'); prodList.innerHTML = "";
        if(data.termekek) {
            Object.keys(data.termekek).forEach(pk => {
                const p = data.termekek[pk];
                totalNeededKg += (p.weight * p.qty) / 100;
                prodList.innerHTML += `<div class="item-card"><div style="flex:1"><strong>${p.name}</strong> <small style="color:var(--gray)">${p.weight}dkg</small></div><input type="number" class="qty-input" value="${p.qty}" onchange="updateQty('${pk}', this.value)"><button onclick="openEditProduct('${pk}', '${p.name}', ${p.weight})" style="background:none; border:none; font-size:18px;">⚙️</button></div>`;
            });
        }
        let totalPercent = 0;
        if(data.recept) Object.values(data.recept).forEach(r => totalPercent += r.szazalek);
        const lisztNeeded = totalPercent > 0 ? (totalNeededKg / (totalPercent / 100)) : 0;
        let finalLiszt = lisztNeeded + manualLisztAdj;
        if(document.getElementById('round-check').checked && finalLiszt > 0) {
            finalLiszt = finalLiszt >= 1 ? Math.ceil(finalLiszt * 2) / 2 : Math.ceil(finalLiszt * 20) / 20;
        }
        const ratio = finalLiszt / 100;
        const finalTotal = (totalPercent * ratio);
        document.getElementById('calc-summary').innerHTML = `Tészta: ${formatSuly(finalTotal)} <small style="color:var(--success)">(${(finalTotal-totalNeededKg)>0?'+':''}${formatSuly(finalTotal-totalNeededKg)})</small>`;
        const calcBody = document.getElementById('calc-body'); calcBody.innerHTML = "";
        if(data.recept) {
            Object.values(data.recept).forEach(r => {
                const isLiszt = r.nev.toLowerCase() === 'liszt';
                calcBody.innerHTML += `<tr><td>${r.nev} (${r.szazalek}%)</td><td style="color:var(--gray); text-align:right;">${formatSuly(r.szazalek * (lisztNeeded/100))}</td><td class="mod-val">${isLiszt?`<button class="step-btn" onclick="adjLiszt(-1)">-</button> `:''}${formatSuly(r.szazalek * ratio)}${isLiszt?` <button class="step-btn" onclick="adjLiszt(1)">+</button>` : ''}</td></tr>`;
            });
        }
    }

    async function openRecipeEditor() {
        closeModal();
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-recipe').classList.remove('hidden');
        document.getElementById('recipe-name').innerText = activeName + " Recept";
        loadIngredients();
    }

    async function loadIngredients() {
        const res = await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/recept.json`);
        const data = await res.json();
        const list = document.getElementById('ingredient-list'); list.innerHTML = "";
        if(data) {
            Object.keys(data).forEach(id => {
                list.innerHTML += `<div class="item-card"><div style="flex:1"><strong>${data[id].nev}</strong>: ${data[id].szazalek}%</div><button class="step-btn" style="background:var(--danger)" onclick="deleteIngredient('${id}')">✕</button></div>`;
            });
        }
    }

    async function saveIngredient() {
        const n = document.getElementById('ing-name').value, p = parseFloat(document.getElementById('ing-percent').value);
        if(!n || isNaN(p)) return;
        await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/recept.json`, { method:'POST', body: JSON.stringify({nev:n, szazalek:p}) });
        closeModal(); loadIngredients();
    }

    async function deleteIngredient(id) {
        if(confirm("Törlöd?")) { await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/recept/${id}.json`, { method:'DELETE' }); loadIngredients(); }
    }

    async function updateQty(pk, val) { await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/termekek/${pk}/qty.json`, { method:'PUT', body: parseInt(val)||0 }); renderCalculation(); }
    function openEditProduct(pk, name, weight) { currentEditPid = pk; document.getElementById('edit-p-name').value = name; document.getElementById('edit-p-weight').value = weight; openModal('modal-edit-product'); }
    async function updateProductData() { const n = document.getElementById('edit-p-name').value, w = parseFloat(document.getElementById('edit-p-weight').value); await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/termekek/${currentEditPid}/name.json`, { method:'PUT', body: JSON.stringify(n) }); await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/termekek/${currentEditPid}/weight.json`, { method:'PUT', body: w }); closeModal(); renderCalculation(); }
    async function deleteProduct() { if(confirm("Törlöd?")) { await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/termekek/${currentEditPid}.json`, { method:'DELETE' }); closeModal(); renderCalculation(); } }
    function formatSuly(kg) { return Math.abs(kg) < 1 && kg !== 0 ? (kg * 1000).toFixed(0) + " g" : kg.toFixed(3) + " kg"; }
    function adjLiszt(dir) { manualLisztAdj += (dir * 0.5); renderCalculation(); }
    async function saveNewDough() { const n = document.getElementById('new-dough-name').value; if(!n) return; await fetch(`${DB_URL}teszta_master/${currentUser.name}.json`, { method: 'POST', body: JSON.stringify({name:n, recept:{"liszt":{nev:"Liszt", szazalek:100}}}) }); closeModal(); loadDoughs(); }
    async function saveProduct() { const n = document.getElementById('p-name').value, w = document.getElementById('p-weight').value, q = document.getElementById('p-qty').value; await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}/termekek.json`, { method:'POST', body: JSON.stringify({name:n, weight:parseFloat(w), qty:parseInt(q)}) }); closeModal(); renderCalculation(); }
    async function deleteDough() { if(confirm("Törlöd a tésztát?")) { await fetch(`${DB_URL}teszta_master/${currentUser.name}/${activeId}.json`, { method:'DELETE' }); closeModal(); showMain(); } }
    function openDoughMenu(id, name) { activeId = id; activeName = name; document.getElementById('menu-title').innerText = name; openModal('modal-dough-menu'); }
    if(currentUser) initApp();
</script>
</body>
</html>
