<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Aktív"));
      }
    </script>
    <title>Elite Tészta Pro 2026</title>
    <style>
        :root { --bg: #000; --glass: rgba(28,28,30,0.7); --border: rgba(255,255,255,0.1); --accent: #30d158; --text: #fff; --gray: #8e8e93; --danger: #ff453a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; min-height: 95vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; }
        h1 { font-size: 24px; margin: 0; font-weight: 800; color: var(--accent); }
        .icon-btn { background: none; border: none; color: var(--accent); font-size: 30px; cursor: pointer; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; }
        .main-btn { width: 100%; background: var(--glass); color: var(--text); border: 1px solid var(--border); padding: 18px; border-radius: 18px; font-weight: 600; text-align: left; margin-bottom: 10px; font-size: 16px; }
        .row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; align-items: center; }
        input { background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; width: 100%; text-align: center; font-size: 14px; }
        .summary { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: rgba(10,10,10,0.95); border-top: 1px solid var(--border); padding: 20px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .s-row { display: grid; grid-template-columns: 1.5fr 1fr; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .val { text-align: right; font-weight: 800; color: var(--accent); font-family: monospace; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="justify-content: center;">
    <h1 style="text-align:center; margin-bottom:30px;">Elite Tészta Pro</h1>
    <input type="text" id="login-user" placeholder="Felhasználó" style="margin-bottom:10px;">
    <input type="password" id="login-pass" placeholder="Jelszó" style="margin-bottom:20px;">
    <button onclick="handleLogin()" style="background:var(--accent); color:black; border:none; padding:18px; border-radius:15px; font-weight:bold; width:100%;">BELÉPÉS</button>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="header">
        <button id="back-btn" class="hidden" onclick="goHome()" style="background:none; border:none; color:var(--accent); font-size:18px;">❮ Vissza</button>
        <h1 id="title">Receptek</h1>
        <button class="icon-btn" onclick="addItems()">+</button>
    </div>
    
    <div id="list-view"></div>
    
    <div id="detail-view" class="hidden" style="padding-bottom: 250px;">
        <div id="items-list"></div>
        <div id="summary-box" class="summary"></div>
    </div>
</div>

<script>
    const DB = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let user = JSON.parse(localStorage.getItem('teszta_session'));
    let data = {};
    let activeId = null;

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const res = await fetch(`${DB}shopping_users/${u}.json`);
        const pass = await res.json();
        if (pass && String(pass).replace(/"/g,'') === String(p)) {
            user = { name: u };
            localStorage.setItem('teszta_session', JSON.stringify(user));
            init();
        } else alert("Hibás belépés!");
    }

    function init() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        load();
    }

    async function load() {
        const res = await fetch(`${DB}teszta_v2/${user.name}.json`);
        data = await res.json() || {};
        render();
    }

    async function save() {
        await fetch(`${DB}teszta_v2/${user.name}.json`, { method: 'PUT', body: JSON.stringify(data) });
        render();
    }

    function addItems() {
        const n = prompt(activeId ? "Termék neve (pl. Nagy kenyér):" : "Recept neve (pl. Kovászos):");
        if (!n) return;
        if (!activeId) {
            const id = "r" + Date.now();
            data[id] = { name: n, items: [], recipe: [{n:"Liszt", p:100}, {n:"Víz", p:60}, {n:"Só", p:2}, {n:"Élesztő", p:2}] };
        } else {
            data[activeId].items.push({ name: n, suly: 115, db: 10 });
        }
        save();
    }

    function render() {
        const list = document.getElementById('list-view');
        const det = document.getElementById('detail-view');
        const back = document.getElementById('back-btn');
        const title = document.getElementById('title');

        if (!activeId) {
            list.classList.remove('hidden'); det.classList.add('hidden'); back.classList.add('hidden');
            title.innerText = "Receptek";
            list.innerHTML = Object.keys(data).map(id => `<button class="main-btn" onclick="openRec('${id}')">${data[id].name}</button>`).join('');
        } else {
            list.classList.add('hidden'); det.classList.remove('hidden'); back.classList.remove('hidden');
            const r = data[activeId];
            title.innerText = r.name;
            document.getElementById('items-list').innerHTML = r.items.map((it, i) => `
                <div class="row">
                    <span style="font-size:12px; white-space:nowrap; overflow:hidden;">${it.name}</span>
                    <input type="number" value="${it.suly}" onchange="data['${activeId}'].items[${i}].suly=this.value; save()">
                    <input type="number" value="${it.db}" onchange="data['${activeId}'].items[${i}].db=this.value; save()">
                    <button onclick="data['${activeId}'].items.splice(${i},1); save()" style="color:var(--danger); border:none; background:none; font-size:22px;">×</button>
                </div>`).join('');
            calc();
        }
    }

    function calc() {
        const r = data[activeId];
        let osszTesztaKg = 0;
        
        // 1. Összes tészta súlya (T)
        r.items.forEach(it => {
            osszTesztaKg += (Number(it.suly) * Number(it.db)) / 100;
        });

        // 2. Össz szorzó kiszámítása (pl. 1.64L)
        let osszSzorzo = r.recipe.reduce((sum, ing) => sum + (Number(ing.p) / 100), 0);
        
        // 3. Liszt súlya (L = T / 1.64)
        const lisztSuly = osszTesztaKg / osszSzorzo;

        let h = `<div style="font-size:11px; color:var(--gray); margin-bottom:8px;">ÖSSZ TÉSZTA: ${osszTesztaKg.toFixed(2)} kg</div>`;
        
        // 4. Összetevők kiszámítása a te képleteddel
        r.recipe.forEach(ing => {
            const alapanyagKg = lisztSuly * (Number(ing.p) / 100);
            h += `<div class="s-row">
                    <span>${ing.n} (${ing.p}%)</span>
                    <span class="val">${alapanyagKg.toFixed(3)} kg</span>
                  </div>`;
        });
        document.getElementById('summary-box').innerHTML = h;
    }

    function openRec(id) { activeId = id; render(); }
    function goHome() { activeId = null; render(); }

    if (user) init();
</script>
</body>
</html>
